# Namek auto-obtains TLS via Let's Encrypt
publicHostname: "namek.piccolospace.com"
listenAddress: ":443"
httpAddress: ":80"  # omit to disable HTTP listener (e.g. Piccolo deployment uses TLS-ALPN-01 only)
adminAddress: ":8056"  # omit to disable PowerDNS admin UI

database:
  url: "postgres://namek:password@localhost:5432/namek?sslmode=disable"
  maxOpenConns: 50   # recommended: 50 for <100k devices, 100+ for larger fleets
  maxIdleConns: 5

dns:
  baseDomain: "piccolospace.com"
  zone: "piccolospace.com."
  relayHostname: "relay.piccolospace.com"
  # nameservers:               # omit for direct mode (defaults to [publicHostname])
  #   - "ns1.piccolospace.com"   # hidden-primary mode: fronting DNS servers
  #   - "ns2.piccolospace.com"
  #   - "ns3.piccolospace.com"

powerDNS:
  apiURL: "http://localhost:8081"
  apiKey: "pdns-api-key"
  serverID: "localhost"
  timeoutSeconds: 10
  # dnsAddress: "127.0.0.1:5353"  # set when PowerDNS listens on non-standard port (enables DNS proxy on :53)

tpm:
  trustedCACertsDir: ""
  allowSoftwareTPM: false

nexus:
  trustedDomainSuffixes:
    - ".nexus.piccolospace.com"
  clientCACertFile: ""
  heartbeatIntervalSeconds: 30
  inactiveThresholdMultiplier: 3

token:
  ttlSeconds: 30
  defaultWeight: 1
  handshakeMaxAgeSeconds: 60
  reauthIntervalSeconds: 300
  reauthGraceSeconds: 30
  maintenanceGraceCapSeconds: 600

auditRetentionDays: 90

# Enrollment rate limiting (separate from nonce)
enrollment:
  maxPending: 5000           # set 10000-50000 for mass recovery scenarios
  pendingTTLSeconds: 300
  rateLimitPerSecond: 10     # global RPS for enrollment endpoints
  burstPerSecond: 20         # global burst (2x rate)
  rateLimitPerIPPerSecond: 2 # per-IP sustained rate
  burstPerIPPerSecond: 5     # per-IP burst (~2.5x rate)

# Nonce endpoint (called on every authenticated request)
nonce:
  maxNonces: 500000              # capacity ~40MB at cap; must accommodate rate * TTL
  ttlSeconds: 60                 # nonce lifetime
  rateLimitPerSecond: 200        # global RPS (separate from enrollment)
  burstPerSecond: 400            # global burst (2x rate)
  rateLimitPerIPPerSecond: 50    # per-IP sustained rate
  burstPerIPPerSecond: 100       # per-IP burst (2x rate)

# Per-device rate limiting (applied to all authenticated endpoints)
deviceRateLimit:
  mutationPerMin: 60   # POST/DELETE operations (1/sec sustained)
  mutationBurst: 10
  readPerMin: 120      # GET/PATCH operations (2/sec sustained)
  readBurst: 20
