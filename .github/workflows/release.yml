name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: '1.24'

      - name: Build
        run: go build ./...

      - name: Test
        run: go test -race -count=1 ./...

  release:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: '1.24'

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          go build -ldflags "-s -w" -o namek-${{ matrix.goos }}-${{ matrix.goarch }} ./cmd/namek/

      - uses: actions/upload-artifact@v5
        with:
          name: namek-${{ matrix.goos }}-${{ matrix.goarch }}
          path: namek-${{ matrix.goos }}-${{ matrix.goarch }}

  docker:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5

      - uses: docker/setup-qemu-action@v4

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push namek-server
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Containerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VERSION=${{ github.sha }}
          tags: |
            ghcr.io/atdexters-lab/namek-server:latest
            ghcr.io/atdexters-lab/namek-server:${{ github.sha }}

      - name: Build and push namek-postgres
        uses: docker/build-push-action@v7
        with:
          context: docker/postgres
          file: docker/postgres/Containerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/atdexters-lab/namek-postgres:latest
            ghcr.io/atdexters-lab/namek-postgres:${{ github.sha }}

      - name: Build and push namek-powerdns
        uses: docker/build-push-action@v7
        with:
          context: docker/powerdns
          file: docker/powerdns/Containerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/atdexters-lab/namek-powerdns:latest
            ghcr.io/atdexters-lab/namek-powerdns:${{ github.sha }}
