launch=gpgsql
gpgsql-host=postgres
gpgsql-port=5432
gpgsql-dbname=powerdns
gpgsql-user=pdns
gpgsql-password=pdns

# Required: prevent empty non-terminals from blocking wildcard during ACME challenges
strict-rfc-wildcards=no

# Enable Lua records for future geo-routing
enable-lua-records=yes

# API for record management
webserver=yes
webserver-address=0.0.0.0
webserver-port=8081
webserver-allow-from=0.0.0.0/0,::/0
api=yes
api-key=pdns-api-key

# Logging
loglevel=4
log-dns-queries=no
