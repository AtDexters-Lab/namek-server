launch=gpgsql
gpgsql-host=postgres
gpgsql-port=5432
gpgsql-dbname=powerdns
gpgsql-user=pdns
gpgsql-password=pdns

# Use high ports for dev
local-port=5354

# API for record management
webserver=yes
webserver-address=0.0.0.0
webserver-port=8181
webserver-allow-from=0.0.0.0/0,::/0
api=yes
api-key=pdns-dev-key

# Logging
loglevel=4
log-dns-queries=no
