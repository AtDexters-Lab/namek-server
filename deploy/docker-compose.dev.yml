services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata-dev:/var/lib/postgresql/data
      - ./01-init-db.sql:/docker-entrypoint-initdb.d/01-init-db.sql
      - ./02-pdns-schema.sql:/docker-entrypoint-initdb.d/02-pdns-schema.sql
      - ./03-zone-bootstrap-dev.sql:/docker-entrypoint-initdb.d/03-zone-bootstrap-dev.sql
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  powerdns:
    image: powerdns/pdns-auth-49:latest
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./pdns-dev.conf:/etc/powerdns/pdns.conf:ro
    ports:
      - "127.0.0.1:5354:5354/udp"
      - "127.0.0.1:5354:5354/tcp"
      - "127.0.0.1:8181:8181"

  pebble:
    image: letsencrypt/pebble:latest
    environment:
      PEBBLE_VA_ALWAYS_VALID: "1"
    ports:
      - "127.0.0.1:14000:14000"
      - "127.0.0.1:15000:15000"

volumes:
  pgdata-dev:
